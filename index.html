<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauntlet</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold-light: #f6d87c;
  --gold-dark:  #8a6a1e;
  --stone-1:    #2b2f3a;
  --stone-2:    #171a22;
  --parchment:  #f0e0bc;
  --ink:        #3a2c16;

  --gold-text:  #ffd763;
  --green:      #90ee90;
  --red:        #ff8a7a;
  --blue:       #88ccff;
  --muted:      #b09a5e;
  --text:       #e8dcc0;

  --btn-w: 58px;
  --btn-h: 74px;
  --portrait: 72px;
  --dur-fast: 120ms;
  --dur-med:  300ms;
}

body {
  background: #0d1420;
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  overflow: hidden; user-select: none;
  display: flex; flex-direction: column; height: 100vh;
}

.pix { image-rendering: pixelated; }

/* WC3-style gold-trimmed stone panel */
.wc3-panel {
  background: linear-gradient(180deg, var(--stone-1), var(--stone-2));
  border: 2px solid;
  border-image: linear-gradient(180deg, var(--gold-light), var(--gold-dark)) 1;
  box-shadow: inset 0 0 0 1px #000, inset 0 0 18px rgba(0,0,0,0.55);
}

/* Value colors (classes, not inline styles, so flash animations can override) */
.c-gold  { color: var(--gold-text); }
.c-green { color: var(--green); }
.c-red   { color: var(--red); }
.c-blue  { color: var(--blue); }

/* ── TOP BAR ── */
#top-bar {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: stretch;
  padding: 4px 14px; gap: 12px;
  min-height: 52px; flex-shrink: 0;
  z-index: 5;
}

#res-bar { display: flex; gap: 18px; align-items: center; justify-self: start; }
.res { display: flex; gap: 7px; align-items: center; }
.res-ic {
  display: inline-block;
  width: 26px; height: 26px; object-fit: contain;
  image-rendering: pixelated;
  filter: drop-shadow(1px 1px 0 #000);
}
.res-val {
  display: inline-block;
  font-size: 17px; font-weight: bold; color: #fff;
  text-shadow: 1px 1px 0 #000;
}
.res-lbl {
  font-size: 9px; letter-spacing: 1px; color: var(--muted);
  text-transform: uppercase; display: block; line-height: 1;
}
@keyframes hud-pulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.res-val.pulse { animation: hud-pulse 0.5s ease; }

/* Stat change flashes (color-only, coexists with transform-only hud-pulse) */
@keyframes stat-flash-up {
  0%   { color: #d9ffd9; text-shadow: 1px 1px 0 #000, 0 0 10px rgba(144, 238, 144, 0.9); }
  100% { text-shadow: 1px 1px 0 #000; }
}
@keyframes stat-flash-down {
  0%   { color: #ff5b4a; text-shadow: 1px 1px 0 #000, 0 0 10px rgba(255, 91, 74, 0.9); }
  100% { text-shadow: 1px 1px 0 #000; }
}
.flash-up   { animation: stat-flash-up   0.6s ease; }
.flash-down { animation: stat-flash-down 0.6s ease; }

#wave-banner {
  text-align: center; align-self: flex-start;
  padding: 6px 26px 8px;
  background: linear-gradient(180deg, #1d2634, #10151f);
  border: 2px solid;
  border-image: linear-gradient(180deg, var(--gold-light), var(--gold-dark)) 1;
  border-top: none;
  box-shadow: inset 0 0 0 1px #000;
}
#wave-label { font-size: 15px; font-weight: bold; color: var(--gold-light); letter-spacing: 1px; }
#wave-sub   { font-size: 10px; color: #9a9078; }
#wave-timer { color: #fff; font-weight: bold; }

/* Wave-incoming telegraph */
@keyframes wave-incoming {
  0%, 100% { border-image: linear-gradient(180deg, var(--gold-light), var(--gold-dark)) 1; box-shadow: inset 0 0 0 1px #000; }
  50%      { border-image: linear-gradient(180deg, #ff8a5c, #a3341c) 1; box-shadow: inset 0 0 0 1px #000, 0 0 14px rgba(255, 110, 70, 0.7); }
}
#wave-banner.incoming { animation: wave-incoming 0.6s ease-in-out infinite; }
#wave-banner.incoming #wave-label { color: #ffb08a; }

#right-cluster { display: flex; gap: 10px; align-items: center; justify-self: end; }

#income-box {
  padding: 5px 12px;
  font-size: 12px; color: var(--gold-text);
  white-space: nowrap;
}
#income-box b { color: #fff; font-size: 15px; }

#scoreboard { border-collapse: collapse; font-size: 11px; }
#scoreboard th {
  color: var(--muted); font-weight: normal; font-size: 9px;
  text-transform: uppercase; letter-spacing: 1px; padding: 0 7px;
}
#scoreboard td { padding: 0 7px; text-align: center; font-weight: bold; color: #fff; }
#scoreboard .sb-name { text-align: left; font-size: 11px; }
.row-you .sb-name { color: #7fc4ff; }
.row-ai  .sb-name { color: #ff9a8a; }

/* ── GAME CANVAS AREA ── */
#game-area {
  flex: 1; overflow: hidden; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0d1420;
}
#game-area canvas { display: block; }

/* ── BOTTOM COMMAND PANEL ── */
#bottom-bar {
  display: flex; gap: 10px; align-items: stretch;
  padding: 8px 12px;
  min-height: 118px; flex-shrink: 0;
  z-index: 5;
}

/* Portrait box */
#portrait-box { display: flex; gap: 10px; padding: 6px 10px; align-items: center; min-width: 300px; }
#portrait-img, #portrait-icon {
  width: var(--portrait); height: var(--portrait);
  object-fit: cover; flex-shrink: 0;
  image-rendering: pixelated;
  border: 2px solid;
  border-image: linear-gradient(180deg, var(--gold-light), var(--gold-dark)) 1;
  background: #0c1018;
}
#portrait-icon {
  display: none;
  background-repeat: no-repeat;
}
#portrait-info { flex: 1; min-width: 130px; }
#portrait-name { font-size: 14px; font-weight: bold; color: var(--gold-light); }
#portrait-stats { font-size: 11px; color: #cfc4a4; line-height: 1.45; white-space: pre-line; }
#portrait-stats .up  { color: var(--green); font-weight: bold; }
#portrait-stats .dim { color: #8d8368; }
#portrait-actions { display: flex; flex-direction: column; gap: 6px; }

/* WC3 action buttons (upgrade/sell/speed) */
.wc3-btn {
  font-family: inherit; font-size: 12px; font-weight: bold;
  color: #ffe9b0; cursor: pointer;
  padding: 5px 14px;
  background: linear-gradient(180deg, #3d4453, #232936);
  border: 2px solid;
  border-image: linear-gradient(180deg, var(--gold-light), var(--gold-dark)) 1;
  box-shadow: inset 0 0 0 1px #000;
  text-shadow: 1px 1px 0 #000;
  transition: transform var(--dur-fast) ease, filter var(--dur-fast) ease;
}
.wc3-btn:hover:not(:disabled) { background: linear-gradient(180deg, #4d5668, #2c3342); filter: brightness(1.08); }
.wc3-btn:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
.wc3-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.wc3-btn .cost-bad { color: #ff6b5e; }

/* Speed button active states */
#speed-btn.speed-2, #speed-btn.speed-3 {
  background: linear-gradient(180deg, #6a5518, #3d3110);
  color: #fff2c0;
  box-shadow: inset 0 0 0 1px #000, 0 0 10px rgba(246, 216, 124, 0.45);
}

/* Command cards */
.card { padding: 4px 10px 6px; display: flex; flex-direction: column; }
.card-title {
  font-size: 9px; letter-spacing: 2px; color: var(--muted);
  text-transform: uppercase; text-align: center; margin-bottom: 3px;
}
.cmd-grid { display: flex; gap: 6px; flex-wrap: wrap; align-content: flex-start; }

#command-groups { display: flex; gap: 10px; align-items: stretch; flex: 1; }
#system-card { margin-left: auto; justify-content: center; }
#system-card .cmd-grid { flex-direction: column; flex-wrap: nowrap; gap: 6px; }

.cmd-btn {
  position: relative;
  width: var(--btn-w); height: var(--btn-h);
  cursor: pointer;
  background: linear-gradient(180deg, #232936, #12161f);
  border: 2px solid #55483a;
  box-shadow: inset 0 0 0 1px #000;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 3px;
  font-family: inherit;
  transition: transform var(--dur-fast) ease, border-color var(--dur-fast) ease,
              box-shadow var(--dur-fast) ease;
}
.cmd-btn:hover:not(.locked) { border-color: var(--gold-light); }
.cmd-btn:hover:not(.locked) .cmd-icon { filter: brightness(1.15); }
.cmd-btn:active:not(.locked):not(.cant-afford) {
  transform: translateY(1px) scale(0.96);
  box-shadow: inset 0 0 0 1px #000, inset 0 0 10px rgba(0,0,0,0.7);
}
.cmd-btn.selected {
  border-color: var(--gold-light);
  box-shadow: inset 0 0 0 1px #000, 0 0 10px rgba(246, 216, 124, 0.7);
}

/* Locked / can't-afford use classes (not [disabled]) so tooltips keep firing */
.cmd-btn.locked { cursor: not-allowed; }
.cmd-btn.cant-afford { cursor: not-allowed; }
.cmd-btn.cant-afford .cmd-icon { filter: grayscale(1) brightness(0.55); }
.cmd-btn.cant-afford .cmd-name { color: #666; }
.cmd-btn.cant-afford .cmd-cost { color: #ff6b5e; }

@keyframes just-unlocked {
  0%   { border-color: var(--gold-light); box-shadow: inset 0 0 0 1px #000, 0 0 18px rgba(246, 216, 124, 1); }
  100% { border-color: #55483a;           box-shadow: inset 0 0 0 1px #000; }
}
.cmd-btn.just-unlocked { animation: just-unlocked 1.2s ease; }

.cmd-icon {
  width: 44px; height: 44px;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  transition: filter var(--dur-fast) ease;
}
.cmd-name {
  font-size: 9px; color: var(--text); line-height: 1.1;
  max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cmd-cost {
  font-size: 10px; font-weight: bold; color: var(--gold-text);
  text-shadow: 1px 1px 0 #000;
}
.cmd-badge {
  position: absolute; top: 1px; right: 2px;
  font-size: 9px; font-weight: bold; color: var(--green);
  text-shadow: 1px 1px 0 #000;
}
.cmd-lock {
  position: absolute; inset: 0;
  background: url('assets/tinyswords/UI/Icons/Regular_10.png') center 18px / 26px 26px no-repeat,
              rgba(10, 12, 18, 0.55);
  image-rendering: pixelated;
  display: none;
}
.cmd-btn.locked .cmd-lock { display: block; }

/* ── TOOLTIP (parchment) ── */
#tooltip {
  position: fixed; pointer-events: none; z-index: 100;
  max-width: 250px;
  padding: 8px 12px;
  font-size: 12px; line-height: 1.45; color: var(--ink);
  background: var(--parchment);
  border: 2px solid #7a5b28;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.5), inset 0 0 0 1px #fff6df;
  opacity: 0; transform: translateY(4px);
  transition: opacity var(--dur-fast) ease, transform var(--dur-fast) ease;
  visibility: hidden;
}
#tooltip.show { opacity: 1; transform: translateY(0); visibility: visible; }
#tooltip .tt-head {
  display: block; font-weight: bold; font-size: 13px;
  border-bottom: 1px solid rgba(122, 91, 40, 0.4);
  padding-bottom: 3px; margin-bottom: 4px;
}
#tooltip .tt-cost { color: #8a6a1e; font-weight: bold; }
#tooltip .tt-hint { display: block; margin-top: 4px; font-style: italic; color: #7d6a45; font-size: 11px; }

/* ── GAME OVER OVERLAY ── */
#overlay {
  position: fixed; inset: 0; background: rgba(5, 8, 14, 0.88);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 200; gap: 14px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
#overlay.show { opacity: 1; pointer-events: auto; }
#overlay-card {
  padding: 36px 64px; text-align: center;
  display: flex; flex-direction: column; gap: 14px; align-items: center;
  transform: scale(0.85);
  transition: transform 0.45s cubic-bezier(0.2, 1.4, 0.4, 1);
}
#overlay.show #overlay-card { transform: scale(1); }
#overlay h1 {
  font-size: 44px; color: var(--gold-light);
  text-shadow: 2px 2px 0 #000, 0 0 30px rgba(246, 216, 124, 0.5);
  letter-spacing: 2px;
}
#overlay p { font-size: 16px; color: #cfc4a4; }
#overlay h1, #overlay p, #overlay #restart-btn {
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#overlay.show h1 { opacity: 1; transform: none; transition-delay: 0.15s; }
#overlay.show p  { opacity: 1; transform: none; transition-delay: 0.3s; }
#overlay.show #restart-btn { opacity: 1; transform: none; transition-delay: 0.45s; }

/* ── RESPONSIVE: short viewports give height back to the canvas ── */
@media (max-height: 820px) {
  :root { --btn-w: 50px; --btn-h: 64px; --portrait: 56px; }
  #top-bar { min-height: 44px; padding: 3px 10px; }
  #bottom-bar { min-height: 96px; padding: 5px 10px; }
  #portrait-box { min-width: 250px; }
  .res-val { font-size: 15px; }
  .cmd-icon { width: 38px; height: 38px; background-size: auto; }
  #wave-banner { padding: 4px 18px 6px; }
  #overlay h1 { font-size: 36px; }
}
@media (max-height: 700px) {
  .res-lbl, #income-box { display: none; }
  :root { --btn-w: 46px; --btn-h: 58px; --portrait: 48px; }
  #portrait-box { min-width: 220px; }
  #portrait-stats { font-size: 10px; }
  #scoreboard { font-size: 10px; }
  .cmd-name { font-size: 8px; }
  #bottom-bar { min-height: 80px; }
}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div id="top-bar" class="wc3-panel">
  <div id="res-bar">
    <div class="res">
      <img class="res-ic" src="assets/tinyswords/Resources/Resources/G_Idle.png" alt="">
      <div><span class="res-lbl">Gold</span><span class="res-val c-gold" id="gold-val">200</span></div>
    </div>
    <div class="res">
      <span class="res-ic" style="background:url('assets/tinyswords/UI/Icons/Regular_08.png') center / contain no-repeat"></span>
      <div><span class="res-lbl">Income</span><span class="res-val c-green" id="income-val">15</span></div>
    </div>
    <div class="res">
      <img class="res-ic" src="assets/tinyswords/Factions/Knights/Buildings/Castle/Castle_Blue.png" alt="">
      <div><span class="res-lbl">Lives</span><span class="res-val c-red" id="lives-val">20</span></div>
    </div>
    <div class="res">
      <span class="res-ic" style="background:url('assets/tinyswords/Factions/Knights/Troops/Dead/Dead.png') -156px 0 / 182px 52px no-repeat"></span>
      <div><span class="res-lbl">Kills</span><span class="res-val c-blue" id="kills-val">0</span></div>
    </div>
  </div>

  <div id="wave-banner">
    <div id="wave-label">Wave 1</div>
    <div id="wave-sub">next wave in <span id="wave-timer">25</span>s</div>
  </div>

  <div id="right-cluster">
    <div id="income-box" class="wc3-panel">Next income in <b id="income-timer">15</b>s</div>
    <table id="scoreboard">
      <tr><th></th><th>Lives</th><th>Income</th><th>Kills</th><th>Gold</th></tr>
      <tr class="row-you">
        <td class="sb-name">YOU</td>
        <td id="sb-lives">20</td><td id="sb-income">15</td><td id="sb-kills">0</td><td id="sb-gold">200</td>
      </tr>
      <tr class="row-ai">
        <td class="sb-name">AI</td>
        <td id="ai-lives-val">20</td><td id="ai-income-val">15</td><td id="ai-kills-val">0</td><td id="ai-gold-val">200</td>
      </tr>
    </table>
  </div>
</div>

<!-- ── PHASER CANVAS ── -->
<div id="game-area"></div>

<!-- ── BOTTOM COMMAND PANEL ── -->
<div id="bottom-bar" class="wc3-panel">
  <div id="portrait-box" class="wc3-panel">
    <img id="portrait-img" src="assets/tinyswords/UI/Extra/Avatar_03.png" alt="">
    <div id="portrait-icon"></div>
    <div id="portrait-info">
      <div id="portrait-name">Commander</div>
      <div id="portrait-stats">Select a tower or pick one to build.</div>
    </div>
    <div id="portrait-actions">
      <button id="upgrade-btn" class="wc3-btn" style="display:none"></button>
      <button id="sell-btn" class="wc3-btn">Sell (50%)</button>
    </div>
  </div>

  <div id="command-groups">
    <div class="card wc3-panel">
      <div class="card-title">Build</div>
      <div id="tower-btns" class="cmd-grid"></div>
    </div>

    <div class="card wc3-panel">
      <div class="card-title">Send</div>
      <div id="send-btns" class="cmd-grid"></div>
    </div>

    <div id="system-card" class="card wc3-panel">
      <div class="card-title">System</div>
      <div class="cmd-grid">
        <button id="speed-btn" class="wc3-btn">Speed: 1x</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TOOLTIP + GAME OVER OVERLAY ── -->
<div id="tooltip"></div>
<div id="overlay">
  <div id="overlay-card" class="wc3-panel">
    <h1 id="overlay-title"></h1>
    <p  id="overlay-msg"></p>
    <button id="restart-btn" class="wc3-btn" style="font-size:16px;padding:10px 30px">Play Again</button>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
